name: Claude Code - Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Label issue with Claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-5-20250929
          command: /label-issue ${{ github.event.issue.number }}
          allowed_tools: "Read,Glob,Grep,Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh label list:*),Bash(gh search issues:*)"
          timeout_minutes: 5
